<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoYield Protocol - Web3 Dashboard</title>
    <style>
        :root { --primary: #27ae60; --secondary: #2c3e50; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--secondary); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; }
        h2 { color: var(--primary); margin-bottom: 10px; }
        p { color: #666; font-size: 14px; }
        .status-box { background: #ebf5ee; padding: 10px; border-radius: 8px; margin: 20px 0; font-size: 13px; border-left: 4px solid var(--primary); text-align: left; word-break: break-all; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 16px; }
        .btn-connect { background-color: var(--secondary); color: white; }
        .btn-action { background-color: var(--primary); color: white; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
    </style>
</head>
<body>

<div class="card">
    <h2>EcoYield Protocol</h2>
    <p>Ecossistema de Staking e Governança</p>
    
    <div class="status-box" id="walletStatus">
        <b>Status:</b> Desconectado<br>
        <b>Endereço:</b> -
    </div>

    <button id="btnConnect" class="btn-connect">Conectar MetaMask</button>
    
    <hr>

    <h3>Operações</h3>
    <input type="number" id="stakeAmount" placeholder="Quantidade de $ECO para Stake">
    <button id="btnStake" class="btn-action" disabled>Depositar no Staking</button>
    
    <button id="btnMint" class="btn-action" disabled>Mintar EcoBadge (NFT)</button>

    <div id="log" style="margin-top: 20px; font-size: 12px; color: #888;"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>

<script>
    // --- CONFIGURAÇÃO DOS CONTRATOS (COLE SEUS ENDEREÇOS DO REMIX AQUI) ---
    const STAKING_ADDRESS = "0xD7ACd2a9FD159E69Bb102A1ca21C9a3e3A5F771B"; 
    const NFT_ADDRESS = "0xd9145CCE52D386f254917e481eB44e9943F39138";
    

    // ABIs mínimas para as funções que vamos usar
    const STAKING_ABI = ["function stake(uint256 _amount) external", "function stakedBalance(address user) public view returns (uint256)"];
    const NFT_ABI = ["function safeMint(address to) public", "function balanceOf(address owner) public view returns (uint256)"];

    let provider, signer, stakingContract, nftContract;

    const btnConnect = document.getElementById("btnConnect");
    const btnStake = document.getElementById("btnStake");
    const btnMint = document.getElementById("btnMint");
    const walletStatus = document.getElementById("walletStatus");
    const log = document.getElementById("log");

    function updateLog(msg, color = "#888") {
        log.innerText = msg;
        log.style.color = color;
    }

    // 1. Lógica de Conexão
    btnConnect.addEventListener("click", async () => {
        if (!window.ethereum) {
            alert("Instale a MetaMask para usar este protocolo!");
            return;
        }

        try {
            updateLog("Solicitando conexão...");
            // Acorda a MetaMask
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            
            provider = new ethers.BrowserProvider(window.ethereum);
            signer = await provider.getSigner();
            const address = accounts[0];

            // Atualiza Interface
            walletStatus.innerHTML = `<b>Status:</b> Conectado (Sepolia)<br><b>Endereço:</b> ${address}`;
            walletStatus.style.borderLeftColor = "#27ae60";
            
            // Instancia os contratos
            stakingContract = new ethers.Contract(STAKING_ADDRESS, STAKING_ABI, signer);
            nftContract = new ethers.Contract(NFT_ADDRESS, NFT_ABI, signer);

            // Habilita botões
            btnStake.disabled = false;
            btnMint.disabled = false;
            btnConnect.innerText = "Carteira Conectada";
            btnConnect.style.backgroundColor = "#27ae60";
            
            updateLog("Pronto para interagir!", "green");
        } catch (error) {
            console.error(error);
            updateLog("Erro ao conectar. Tente novamente.", "red");
        }
    });

    // 2. Lógica de Stake
    btnStake.addEventListener("click", async () => {
        const amount = document.getElementById("stakeAmount").value;
        if (!amount || amount <= 0) return alert("Insira um valor válido.");

        try {
            updateLog("Aguardando confirmação na MetaMask...");
            const amountWei = ethers.parseEther(amount.toString());
            
            // Envia a transação de Stake
            const tx = await stakingContract.stake(amountWei);
            updateLog("Transação enviada! Aguardando block...", "blue");
            
            await tx.wait();
            updateLog("Stake realizado com sucesso!", "green");
            alert("Sucesso! Tokens depositados.");
        } catch (error) {
            console.error(error);
            updateLog("Erro: Verifique se você aprovou os tokens antes.", "red");
        }
    });

    // 3. Lógica de Mint NFT
    btnMint.addEventListener("click", async () => {
        try {
            const address = await signer.getAddress();
            updateLog("Solicitando Mint de NFT...");
            
            const tx = await nftContract.safeMint(address);
            updateLog("Processando seu EcoBadge...", "blue");
            
            await tx.wait();
            updateLog("EcoBadge Mintado! Confira no Etherscan.", "green");
            alert("NFT recebido com sucesso!");
        } catch (error) {
            console.error(error);
            updateLog("Erro ao mintar NFT.", "red");
        }
    });
</script>

</body>
</html>
